<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 102" role="img" aria-label="Vervve Aviation Academy">
  <!-- Ascent Arc — gold, references takeoff trajectory -->
  <path d="M 8 26 Q 40 8 72 26" fill="none" stroke="#E8A020" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left Arm — Deep Navy (authority, depth, institution) -->
  <polygon points="10,28 30,28 44,90 30,90" fill="#0B1F45"/>
  <!-- Right Arm — Sky Blue (open sky, possibility, aspiration) -->
  <polygon points="50,28 70,28 50,90 36,90" fill="#1A6CB4"/>
  <!-- Gold Navigation Tip — compass marker, precision -->
  <polygon points="34,90 46,90 40,102" fill="#E8A020"/>
</svg>
